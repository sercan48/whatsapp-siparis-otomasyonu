name: Scheduled Database Backup

on:
  schedule:
    # Run every 6 hours (matches RPO target)
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      BACKUP_SECRET_KEY: ${{ secrets.BACKUP_SECRET_KEY }}

    steps:
      - name: Trigger Backup Edge Function
        run: |
          echo "🔄 Triggering backup for project: $SUPABASE_PROJECT_REF"
          
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "$SUPABASE_URL/functions/v1/backup-database" \
            -H "Authorization: Bearer $BACKUP_SECRET_KEY" \
            -H "Content-Type: application/json")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "Response: $BODY"
          echo "HTTP Code: $HTTP_CODE"
          
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "❌ Backup failed with HTTP $HTTP_CODE"
            exit 1
          fi
          
          echo "✅ Backup completed successfully"

      - name: Notify on Failure
        if: failure()
        run: |
          echo "🚨 Backup failed! Check logs for details."
          # Add Slack/Discord webhook notification here if needed
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"🚨 Database backup failed!"}' \
          #   ${{ secrets.SLACK_WEBHOOK }}
